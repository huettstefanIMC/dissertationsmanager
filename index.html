<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissertationsmanager</title>
<style>
  :root {
    --primary: #2c3e7a;
    --primary-light: #3d52a0;
    --accent: #e8a838;
    --bg: #f4f6fb;
    --sidebar-bg: #1e2a5e;
    --card: #ffffff;
    --text: #1a1f36;
    --text-muted: #6b7280;
    --border: #e2e8f0;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(44,62,122,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--sidebar-bg); color: #fff;
    display: flex; flex-direction: column; padding: 0; overflow: hidden;
  }
  #sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #sidebar-header h1 { font-size: 15px; font-weight: 700; line-height: 1.3; color: #fff; }
  #sidebar-header p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  nav { flex: 1; padding: 12px 0; }
  nav button {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
    padding: 11px 20px; font-size: 13.5px; text-align: left; transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  nav button:hover { background: rgba(255,255,255,0.07); color: #fff; }
  nav button.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--accent); font-weight: 600; }
  nav button .icon { font-size: 16px; width: 20px; text-align: center; }
  #sync-section { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  #sync-section button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  #sync-section button:hover { background: rgba(255,255,255,0.15); }
  #sync-section .btn-row { display: flex; gap: 6px; }
  #sync-section .btn-row button { flex: 1; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; min-height: 60px; }
  #topbar h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
  #topbar .topbar-right { display: flex; gap: 8px; align-items: center; }
  #content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* CARDS & BUTTONS */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .card-header h3 { font-size: 14px; font-weight: 600; color: var(--text); }
  .btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: #fee2e2; color: var(--danger); }
  .btn-danger:hover { background: #fecaca; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  input, select, textarea {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
    font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; width: 100%;
    transition: border-color 0.15s; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; }
  textarea { resize: vertical; min-height: 80px; }
  .form-actions { grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 560px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--primary); }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-yellow { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-gray { background: #f3f4f6; color: #374151; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 2px solid var(--border); }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8faff; }
  .actions { display: flex; gap: 6px; }

  /* MEILENSTEINE */
  .milestone-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow 0.15s; }
  .milestone-item:hover { box-shadow: var(--shadow); }
  .milestone-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .milestone-body { flex: 1; }
  .milestone-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .milestone-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width 0.3s; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 24px; }
  .timeline-item::before { content: ''; position: absolute; left: -20px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary); }

  /* TODO */
  .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .todo-item:last-child { border-bottom: none; }
  .todo-item input[type="checkbox"] { margin-top: 2px; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--primary); }
  .todo-text { flex: 1; font-size: 13.5px; line-height: 1.4; }
  .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
  .todo-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* TAGEBUCH */
  .entry-item { border-left: 3px solid var(--primary); padding: 12px 16px; background: #f8faff; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  .entry-date { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .entry-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .entry-text { font-size: 13.5px; line-height: 1.6; color: #374151; white-space: pre-wrap; }
  .entry-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: #e0e7ff; color: #3730a3; font-size: 11px; padding: 2px 7px; border-radius: 12px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
  .stat-number { font-size: 28px; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  /* KONTAKT */
  .kontakt-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    #sidebar { width: 56px; min-width: 56px; }
    #sidebar-header, nav button span, #sync-section { display: none; }
    nav button { justify-content: center; padding: 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    #content { padding: 16px; }
    #topbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>📘 Dissert&shy;ations&shy;manager</h1>
    <p>Persönliches Forschungstool</p>
  </div>
  <nav>
    <button class="active" onclick="showSection('dashboard')">
      <span class="icon">🏠</span><span>Übersicht</span>
    </button>
    <button onclick="showSection('meilensteine')">
      <span class="icon">🎯</span><span>Meilensteine</span>
    </button>
    <button onclick="showSection('termine')">
      <span class="icon">📅</span><span>Termine</span>
    </button>
    <button onclick="showSection('todos')">
      <span class="icon">✅</span><span>To-Do</span>
    </button>
    <button onclick="showSection('tagebuch')">
      <span class="icon">📓</span><span>Forschungstagebuch</span>
    </button>
    <button onclick="showSection('kontakte')">
      <span class="icon">👥</span><span>Kontakte</span>
    </button>
  </nav>
  <div id="sync-section">
    <div class="btn-row">
      <button onclick="exportData()" title="Daten exportieren">⬇ Export</button>
      <button onclick="document.getElementById('importFile').click()" title="Daten importieren">⬆ Import</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Übersicht</h2>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ====== DATA STORE ======
let data = {
  meilensteine: [],
  termine: [],
  todos: [],
  tagebuch: [],
  kontakte: []
};

function save() {
  try { localStorage.setItem('dissManager_v1', JSON.stringify(data)); } catch(e) {}
}

function load() {
  try {
    const s = localStorage.getItem('dissManager_v1');
    if (s) data = JSON.parse(s);
  } catch(e) {}
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dissertationsmanager_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      data = JSON.parse(ev.target.result);
      save();
      renderCurrent();
      alert('✅ Daten erfolgreich importiert!');
    } catch(e) { alert('❌ Fehler beim Importieren der Datei.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); }

let currentSection = 'dashboard';

function showSection(s) {
  currentSection = s;
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['dashboard','meilensteine','termine','todos','tagebuch','kontakte'][i] === s);
  });
  renderCurrent();
}

function renderCurrent() { renderSection(currentSection); }

function renderSection(s) {
  const titles = { dashboard:'Übersicht', meilensteine:'Meilensteine', termine:'Termine & Interviews', todos:'To-Do Liste', tagebuch:'Forschungstagebuch', kontakte:'Kontaktliste' };
  document.getElementById('page-title').textContent = titles[s] || '';
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';
  const content = document.getElementById('content');

  if (s === 'dashboard') { actions.innerHTML=''; renderDashboard(content); }
  else if (s === 'meilensteine') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openMeilensteinModal()">+ Meilenstein</button>';
    renderMeilensteine(content);
  }
  else if (s === 'termine') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openTerminModal()">+ Termin</button>';
    renderTermine(content);
  }
  else if (s === 'todos') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openTodoModal()">+ Aufgabe</button>';
    renderTodos(content);
  }
  else if (s === 'tagebuch') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openEintragModal()">+ Eintrag</button>';
    renderTagebuch(content);
  }
  else if (s === 'kontakte') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openKontaktModal()">+ Kontakt</button>';
    renderKontakte(content);
  }
}

// ====== DASHBOARD ======
function renderDashboard(el) {
  const totalM = data.meilensteine.length;
  const doneM = data.meilensteine.filter(m => m.status === 'abgeschlossen').length;
  const offeneT = data.termine.filter(t => new Date(t.datum) >= new Date()).length;
  const offeneTodo = data.todos.filter(t => !t.done).length;
  const eintraege = data.tagebuch.length;

  const upcomingTermine = [...data.termine]
    .filter(t => new Date(t.datum) >= new Date())
    .sort((a,b) => new Date(a.datum)-new Date(b.datum))
    .slice(0,3);

  const offeneMeilensteine = [...data.meilensteine]
    .filter(m => m.status !== 'abgeschlossen')
    .sort((a,b) => new Date(a.faellig)-new Date(b.faellig))
    .slice(0,4);

  const pendingTodos = data.todos.filter(t=>!t.done).slice(0,5);

  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number">${totalM}</div><div class="stat-label">Meilensteine</div></div>
    <div class="stat-card"><div class="stat-number">${doneM}</div><div class="stat-label">Abgeschlossen</div></div>
    <div class="stat-card"><div class="stat-number">${offeneT}</div><div class="stat-label">Anstehende Termine</div></div>
    <div class="stat-card"><div class="stat-number">${offeneTodo}</div><div class="stat-label">Offene Aufgaben</div></div>
    <div class="stat-card"><div class="stat-number">${eintraege}</div><div class="stat-label">Tagebucheinträge</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-header"><h3>📅 Nächste Termine</h3></div>
      ${upcomingTermine.length === 0 ? '<div class="empty-state"><p>Keine anstehenden Termine</p></div>' :
        upcomingTermine.map(t => {
          const d = daysUntil(t.datum);
          return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:13px">${esc(t.titel)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${fmtDateTime(t.datum)}</div>
            </div>
            <span class="badge ${d<=2?'badge-red':d<=7?'badge-yellow':'badge-blue'}">${d===0?'Heute':d===1?'Morgen':d+'d'}</span>
          </div>`;
        }).join('')
      }
    </div>
    <div class="card">
      <div class="card-header"><h3>🎯 Meilensteine</h3></div>
      ${offeneMeilensteine.length === 0 ? '<div class="empty-state"><p>Keine offenen Meilensteine</p></div>' :
        offeneMeilensteine.map(m => {
          const d = daysUntil(m.faellig);
          const color = m.status==='abgeschlossen'?'#10b981':m.status==='in_bearbeitung'?'#3d52a0':'#9ca3af';
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
            <div style="flex:1;font-size:13px;font-weight:500">${esc(m.titel)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${m.faellig?fmtDate(m.faellig):''}</div>
          </div>`;
        }).join('')
      }
    </div>
  </div>
  <div class="card" style="margin-top:16px">
    <div class="card-header"><h3>✅ Offene Aufgaben</h3></div>
    ${pendingTodos.length === 0 ? '<div class="empty-state"><p>Alle Aufgaben erledigt 🎉</p></div>' :
      pendingTodos.map(t => `
        <div class="todo-item">
          <input type="checkbox" onchange="toggleTodo('${t.id}',this)">
          <div style="flex:1">
            <div class="todo-text">${esc(t.titel)}</div>
            <div class="todo-meta">${t.prioritaet?'Priorität: '+t.prioritaet:''} ${t.faellig?'· Fällig: '+fmtDate(t.faellig):''}</div>
          </div>
          ${prioBadge(t.prioritaet)}
        </div>`).join('')
    }
  </div>`;
}

// ====== MEILENSTEINE ======
function statusBadge(s) {
  if (s==='geplant') return '<span class="badge badge-gray">Geplant</span>';
  if (s==='in_bearbeitung') return '<span class="badge badge-blue">In Bearbeitung</span>';
  if (s==='abgeschlossen') return '<span class="badge badge-green">Abgeschlossen</span>';
  if (s==='verzoegert') return '<span class="badge badge-red">Verzögert</span>';
  return '';
}

function renderMeilensteine(el) {
  const sorted = [...data.meilensteine].sort((a,b) => new Date(a.faellig||'9999')-new Date(b.faellig||'9999'));
  el.innerHTML = sorted.length === 0
    ? `<div class="card"><div class="empty-state"><div class="emoji">🎯</div><p>Noch keine Meilensteine. Füge deinen ersten Meilenstein hinzu!</p></div></div>`
    : sorted.map(m => {
        const dotColor = m.status==='abgeschlossen'?'#10b981':m.status==='in_bearbeitung'?'#3d52a0':m.status==='verzoegert'?'#ef4444':'#9ca3af';
        return `<div class="milestone-item">
          <div class="milestone-dot" style="background:${dotColor}"></div>
          <div class="milestone-body">
            <div style="display:flex;align-items:center;gap:8px;justify-content:space-between">
              <div class="milestone-title">${esc(m.titel)}</div>
              <div style="display:flex;gap:6px;align-items:center">${statusBadge(m.status)}</div>
            </div>
            ${m.beschreibung ? `<div style="font-size:13px;color:var(--text-muted);margin-top:3px">${esc(m.beschreibung)}</div>` : ''}
            <div class="milestone-meta">
              ${m.faellig ? `<span>📅 Fällig: ${fmtDate(m.faellig)}</span>` : ''}
              ${m.kategorie ? `<span>🏷 ${esc(m.kategorie)}</span>` : ''}
              ${m.fortschritt!==undefined ? `<span>📊 ${m.fortschritt}%</span>` : ''}
            </div>
            ${m.fortschritt!==undefined ? `<div class="progress-bar"><div class="progress-fill" style="width:${m.fortschritt}%"></div></div>` : ''}
          </div>
          <div class="actions">
            <button class="btn btn-sm btn-ghost" onclick="openMeilensteinModal('${m.id}')">✏</button>
            <button class="btn btn-sm btn-danger" onclick="deleteItem('meilensteine','${m.id}')">🗑</button>
          </div>
        </div>`;
      }).join('');
}

function openMeilensteinModal(id) {
  const m = id ? data.meilensteine.find(x=>x.id===id) : null;
  showModal(`<h3>${m?'Meilenstein bearbeiten':'Neuer Meilenstein'}</h3>
    <form class="form-grid" onsubmit="saveMeilenstein(event,'${id||''}')">
      <div class="form-group full"><label>Titel *</label><input name="titel" required value="${esc(m?.titel||'')}"></div>
      <div class="form-group full"><label>Beschreibung</label><textarea name="beschreibung">${esc(m?.beschreibung||'')}</textarea></div>
      <div class="form-group"><label>Fälligkeitsdatum</label><input type="date" name="faellig" value="${m?.faellig||''}"></div>
      <div class="form-group"><label>Kategorie</label><input name="kategorie" value="${esc(m?.kategorie||'')}" placeholder="z.B. Schreiben, Empirie…"></div>
      <div class="form-group"><label>Status</label>
        <select name="status">

function saveMeilenstein(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);

  if (id) { const i = data.meilensteine.findIndex(x=>x.id===id); data.meilensteine[i]=obj; }

// ====== TERMINE ======
function renderTermine(el) {
  const now = new Date();
  const upcoming = [...data.termine].filter(t=>new Date(t.datum)>=now).sort((a,b)=>new Date(a.datum)-new Date(b.datum));
  const past = [...data.termine].filter(t=>new Date(t.datum)<now).sort((a,b)=>new Date(b.datum)-new Date(a.datum));

  const renderList = (arr, label) => {
    if (arr.length === 0) return '';
    return `<div class="card">
      <div class="card-header"><h3>${label}</h3></div>
      <table>
        <thead><tr><th>Titel</th><th>Datum & Uhrzeit</th><th>Typ</th><th>Person</th><th>Ort/Link</th><th></th></tr></thead>
        <tbody>${arr.map(t=>{
          const d=daysUntil(t.datum);
          return `<tr>
            <td><strong>${esc(t.titel)}</strong>${t.notizen?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(t.notizen)}</div>`:''}</td>
            <td>${fmtDateTime(t.datum)}${d!==null&&d>=0?`<br><span style="font-size:11px;color:${d<=2?'var(--danger)':d<=7?'var(--warning)':'var(--text-muted)'}">${d===0?'Heute':d===1?'Morgen':d+'d'}</span>`:''}</td>
            <td>${typBadge(t.typ)}</td>
            <td>${esc(t.person||'—')}</td>
            <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(t.ort||'—')}</td>
            <td class="actions">
              <button class="btn btn-sm btn-ghost" onclick="openTerminModal('${t.id}')">✏</button>
              <button class="btn btn-sm btn-danger" onclick="deleteItem('termine','${t.id}')">🗑</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  };

  el.innerHTML = upcoming.length===0 && past.length===0
    ? `<div class="card"><div class="empty-state"><div class="emoji">📅</div><p>Noch keine Termine. Füge deinen ersten Interview-Termin hinzu!</p></div></div>`
    : renderList(upcoming, '📅 Anstehende Termine') + renderList(past, '🕐 Vergangene Termine');
}

function typBadge(t) {
  const map = { 'Interview': 'badge-blue', 'Betreuungsgespräch': 'badge-green', 'Konferenz': 'badge-yellow', 'Sonstiges': 'badge-gray' };
  return `<span class="badge ${map[t]||'badge-gray'}">${esc(t||'—')}</span>`;
}

function openTerminModal(id) {
  const t = id ? data.termine.find(x=>x.id===id) : null;
  showModal(`<h3>${t?'Termin bearbeiten':'Neuer Termin'}</h3>
    <form class="form-grid" onsubmit="saveTermin(event,'${id||''}')">
      <div class="form-group full"><label>Titel *</label><input name="titel" required value="${esc(t?.titel||'')}"></div>
      <div class="form-group"><label>Datum & Uhrzeit *</label><input type="datetime-local" name="datum" required value="${t?.datum||''}"></div>
      <div class="form-group"><label>Typ</label>
        <select name="typ">
          <option ${(!t||t.typ==='Interview')?'selected':''}>Interview</option>
          <option ${t?.typ==='Betreuungsgespräch'?'selected':''}>Betreuungsgespräch</option>
          <option ${t?.typ==='Konferenz'?'selected':''}>Konferenz</option>
          <option ${t?.typ==='Sonstiges'?'selected':''}>Sonstiges</option>
        </select>
      </div>
      <div class="form-group"><label>Person / Interviewpartner*in</label><input name="person" value="${esc(t?.person||'')}"></div>
      <div class="form-group full"><label>Ort / Meeting-Link</label><input name="ort" value="${esc(t?.ort||'')}"></div>
      <div class="form-group full"><label>Notizen</label><textarea name="notizen">${esc(t?.notizen||'')}</textarea></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>`);
}

function saveTermin(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const obj = { id: id||uid(), titel: f.get('titel'), datum: f.get('datum'), typ: f.get('typ'), person: f.get('person'), ort: f.get('ort'), notizen: f.get('notizen') };
  if (id) { const i = data.termine.findIndex(x=>x.id===id); data.termine[i]=obj; }
  else data.termine.push(obj);
  save(); closeModal(); renderTermine(document.getElementById('content'));
}

// ====== TODOS ======
function prioBadge(p) {
  if (p==='Hoch') return '<span class="badge badge-red">Hoch</span>';
  if (p==='Mittel') return '<span class="badge badge-yellow">Mittel</span>';
  if (p==='Niedrig') return '<span class="badge badge-green">Niedrig</span>';
  return '';
}

function renderTodos(el) {
  const cats = ['Hoch','Mittel','Niedrig',''];
  const open = data.todos.filter(t=>!t.done).sort((a,b)=>cats.indexOf(a.prioritaet)-cats.indexOf(b.prioritaet));
  const done = data.todos.filter(t=>t.done);

  el.innerHTML = `
  <div class="card">
    <div class="card-header"><h3>Offene Aufgaben (${open.length})</h3></div>
    ${open.length===0?'<div class="empty-state"><p>Keine offenen Aufgaben 🎉</p></div>':
      open.map(t=>`<div class="todo-item">
        <input type="checkbox" onchange="toggleTodo('${t.id}',this)">
        <div style="flex:1">
          <div class="todo-text">${esc(t.titel)}</div>
          <div class="todo-meta">${t.kategorie?esc(t.kategorie)+' · ':''}${t.faellig?'Fällig: '+fmtDate(t.faellig):''}${t.beschreibung?'<br>'+esc(t.beschreibung):''}</div>
        </div>
        ${prioBadge(t.prioritaet)}
        <div class="actions">
          <button class="btn btn-sm btn-ghost" onclick="openTodoModal('${t.id}')">✏</button>
          <button class="btn btn-sm btn-danger" onclick="deleteItem('todos','${t.id}')">🗑</button>
        </div>
      </div>`).join('')
    }
  </div>
  ${done.length>0?`<div class="card">
    <div class="card-header"><h3 style="color:var(--text-muted)">Erledigte Aufgaben (${done.length})</h3></div>
    ${done.map(t=>`<div class="todo-item">
      <input type="checkbox" checked onchange="toggleTodo('${t.id}',this)">
      <div style="flex:1"><div class="todo-text done">${esc(t.titel)}</div></div>
      <button class="btn btn-sm btn-danger" onclick="deleteItem('todos','${t.id}')">🗑</button>
    </div>`).join('')}
  </div>`:''}`;
}

function toggleTodo(id, cb) {
  const t = data.todos.find(x=>x.id===id);
  if (t) { t.done = cb.checked; save(); renderTodos(document.getElementById('content')); }
}

function openTodoModal(id) {
  const t = id ? data.todos.find(x=>x.id===id) : null;
  showModal(`<h3>${t?'Aufgabe bearbeiten':'Neue Aufgabe'}</h3>
    <form class="form-grid" onsubmit="saveTodo(event,'${id||''}')">
      <div class="form-group full"><label>Titel *</label><input name="titel" required value="${esc(t?.titel||'')}"></div>
      <div class="form-group full"><label>Beschreibung</label><textarea name="beschreibung">${esc(t?.beschreibung||'')}</textarea></div>
      <div class="form-group"><label>Priorität</label>
        <select name="prioritaet">
          <option value="">— keine —</option>
          <option value="Hoch" ${t?.prioritaet==='Hoch'?'selected':''}>Hoch</option>
          <option value="Mittel" ${t?.prioritaet==='Mittel'?'selected':''}>Mittel</option>
          <option value="Niedrig" ${t?.prioritaet==='Niedrig'?'selected':''}>Niedrig</option>
        </select>
      </div>
      <div class="form-group"><label>Fälligkeitsdatum</label><input type="date" name="faellig" value="${t?.faellig||''}"></div>
      <div class="form-group full"><label>Kategorie</label><input name="kategorie" value="${esc(t?.kategorie||'')}" placeholder="z.B. Literatur, Empirie, Schreiben…"></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>`);
}

function saveTodo(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const obj = { id: id||uid(), titel: f.get('titel'), beschreibung: f.get('beschreibung'), prioritaet: f.get('prioritaet'), faellig: f.get('faellig'), kategorie: f.get('kategorie'), done: id?data.todos.find(x=>x.id===id)?.done||false:false };
  if (id) { const i = data.todos.findIndex(x=>x.id===id); data.todos[i]=obj; }
  else data.todos.push(obj);
  save(); closeModal(); renderTodos(document.getElementById('content'));
}

// ====== TAGEBUCH ======

  const searchId = 'tbSearch_' + Date.now();

    <div style="margin-bottom:12px"><input id="tbSearch" placeholder="🔍 Einträge durchsuchen…" oninput="filterTagebuch(this.value)" style="max-width:320px"></div>
    <div id="tagebuch-list">
    ${sorted.length===0?`<div class="card"><div class="empty-state"><div class="emoji">📓</div><p>Noch keine Einträge. Starte dein Forschungstagebuch!</p></div></div>`:

          <div class="actions">
            <button class="btn btn-sm btn-ghost" onclick="openEintragModal('${e.id}')">✏</button>

function filterTagebuch(q) {

  });
}

          <option value="🚀 Produktiv" ${e?.stimmung==='🚀 Produktiv'?'selected':''}>🚀 Produktiv</option>

      </div>
      <div class="form-group full"><label>Titel / Thema *</label><input name="titel" required value="${esc(e?.titel||'')}"></div>
      <div class="form-group full"><label>Eintrag *</label><textarea name="text" required style="min-height:140px">${esc(e?.text||'')}</textarea></div>
      <div class="form-group full"><label>Tags (kommagetrennt)</label><input name="tags" value="${esc(e?.tags||'')}" placeholder="z.B. Interview, Theorie, Methode"></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>

function saveEintrag(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const obj = { id: id||uid(), datum: f.get('datum'), titel: f.get('titel'), text: f.get('text'), tags: f.get('tags'), stimmung: f.get('stimmung') };
  if (id) { const i = data.tagebuch.findIndex(x=>x.id===id); data.tagebuch[i]=obj; }
  else data.tagebuch.push(obj);
  save(); closeModal(); renderTagebuch(document.getElementById('content'));
}

// ====== KONTAKTE ======
function renderKontakte(el) {
  el.innerHTML = `
    <div style="margin-bottom:12px"><input placeholder="🔍 Kontakte suchen…" oninput="filterKontakte(this.value)" style="max-width:320px"></div>
    <div class="card">
    ${data.kontakte.length===0?`<div class="empty-state"><div class="emoji">👥</div><p>Noch keine Kontakte. Füge deine Interviewpartner*innen hinzu!</p></div>`:`
    <table id="kontakt-table">
      <thead><tr><th>Name</th><th>Institution</th><th>Funktion</th><th>E-Mail / Tel.</th><th>Interview</th><th>Notiz</th><th></th></tr></thead>
      <tbody>
      ${data.kontakte.map(k=>`<tr>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div class="kontakt-avatar">${(k.name||'?').charAt(0).toUpperCase()}</div>
          <strong>${esc(k.name)}</strong>
        </div></td>
        <td>${esc(k.institution||'—')}</td>
        <td>${esc(k.funktion||'—')}</td>
        <td style="font-size:12px">${k.email?`<div>${esc(k.email)}</div>`:''}${k.telefon?`<div>${esc(k.telefon)}</div>`:''}</td>
        <td>${interviewBadge(k.interview_status)}</td>
        <td style="font-size:12px;max-width:120px">${esc(k.notiz||'')}</td>
        <td class="actions">
          <button class="btn btn-sm btn-ghost" onclick="openKontaktModal('${k.id}')">✏</button>
          <button class="btn btn-sm btn-danger" onclick="deleteItem('kontakte','${k.id}')">🗑</button>
        </td>
      </tr>`).join('')}
      </tbody>
    </table>`}
    </div>`;
}

function interviewBadge(s) {
  if (s==='angefragt') return '<span class="badge badge-yellow">Angefragt</span>';
  if (s==='zugesagt') return '<span class="badge badge-blue">Zugesagt</span>';
  if (s==='durchgeführt') return '<span class="badge badge-green">Durchgeführt</span>';
  if (s==='abgesagt') return '<span class="badge badge-red">Abgesagt</span>';
  return '<span class="badge badge-gray">Offen</span>';
}

function filterKontakte(q) {
  const rows = document.querySelectorAll('#kontakt-table tbody tr');
  rows.forEach(r => { r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'; });
}

function openKontaktModal(id) {
  const k = id ? data.kontakte.find(x=>x.id===id) : null;
  showModal(`<h3>${k?'Kontakt bearbeiten':'Neuer Kontakt'}</h3>
    <form class="form-grid" onsubmit="saveKontakt(event,'${id||''}')">
      <div class="form-group full"><label>Name *</label><input name="name" required value="${esc(k?.name||'')}"></div>
      <div class="form-group"><label>Institution / Organisation</label><input name="institution" value="${esc(k?.institution||'')}"></div>
      <div class="form-group"><label>Funktion / Position</label><input name="funktion" value="${esc(k?.funktion||'')}"></div>
      <div class="form-group"><label>E-Mail</label><input type="email" name="email" value="${esc(k?.email||'')}"></div>
      <div class="form-group"><label>Telefon</label><input name="telefon" value="${esc(k?.telefon||'')}"></div>
      <div class="form-group"><label>Interview-Status</label>
        <select name="interview_status">
          <option value="offen" ${(!k||k.interview_status==='offen')?'selected':''}>Offen</option>
          <option value="angefragt" ${k?.interview_status==='angefragt'?'selected':''}>Angefragt</option>
          <option value="zugesagt" ${k?.interview_status==='zugesagt'?'selected':''}>Zugesagt</option>
          <option value="durchgeführt" ${k?.interview_status==='durchgeführt'?'selected':''}>Durchgeführt</option>
          <option value="abgesagt" ${k?.interview_status==='abgesagt'?'selected':''}>Abgesagt</option>
        </select>
      </div>
      <div class="form-group"><label>Interview-Datum</label><input type="date" name="interview_datum" value="${k?.interview_datum||''}"></div>
      <div class="form-group full"><label>Notizen</label><textarea name="notiz">${esc(k?.notiz||'')}</textarea></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>`);
}

function saveKontakt(e, id) {
  e.preventDefault();
  const f = new FormData(e.target);
  const obj = { id: id||uid(), name: f.get('name'), institution: f.get('institution'), funktion: f.get('funktion'), email: f.get('email'), telefon: f.get('telefon'), interview_status: f.get('interview_status'), interview_datum: f.get('interview_datum'), notiz: f.get('notiz') };
  if (id) { const i = data.kontakte.findIndex(x=>x.id===id); data.kontakte[i]=obj; }
  else data.kontakte.push(obj);
  save(); closeModal(); renderKontakte(document.getElementById('content'));
}

// ====== UTILS ======
function deleteItem(list, id) {
  if (!confirm('Wirklich löschen?')) return;
  data[list] = data[list].filter(x=>x.id!==id);
  save(); renderCurrent();
}

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ====== INIT ======
load();
renderSection('dashboard');
</script>
