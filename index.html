<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissertationsmanager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e7a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dissertation">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --primary: #2c3e7a; --primary-light: #3d52a0; --accent: #e8a838;
    --bg: #f4f6fb; --sidebar-bg: #1e2a5e; --card: #ffffff;
    --text: #1a1f36; --text-muted: #6b7280; --border: #e2e8f0;
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    --radius: 10px; --shadow: 0 2px 12px rgba(44,62,122,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 220px; min-width: 220px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; }
  #sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #fff; }
  #sidebar-header p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  nav { flex: 1; padding: 12px 0; }
  nav button { display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; padding: 11px 20px; font-size: 13.5px; text-align: left; transition: all 0.15s; border-left: 3px solid transparent; }
  nav button:hover { background: rgba(255,255,255,0.07); color: #fff; }
  nav button.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--accent); font-weight: 600; }
  nav button .icon { font-size: 16px; width: 20px; text-align: center; }
  #sync-info { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: rgba(255,255,255,0.4); text-align: center; }
  #sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #10b981; margin-right: 5px; vertical-align: middle; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; min-height: 60px; }
  #topbar h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
  #content { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .card-header h3 { font-size: 14px; font-weight: 600; }
  .btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: #fee2e2; color: var(--danger); } .btn-danger:hover { background: #fecaca; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--bg); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  input, select, textarea { padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; width: 100%; transition: border-color 0.15s; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; }
  textarea { resize: vertical; min-height: 80px; }
  .form-actions { grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 560px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--primary); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #d1fae5; color: #065f46; } .badge-yellow { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; } .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-gray { background: #f3f4f6; color: #374151; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 2px solid var(--border); }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; } tr:hover td { background: #f8faff; }
  .actions { display: flex; gap: 6px; }
  .milestone-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow 0.15s; }
  .milestone-item:hover { box-shadow: var(--shadow); }
  .milestone-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .milestone-body { flex: 1; }
  .milestone-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .milestone-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--primary); }
  .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .todo-item:last-child { border-bottom: none; }
  .todo-item input[type="checkbox"] { margin-top: 2px; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--primary); }
  .todo-text { flex: 1; font-size: 13.5px; line-height: 1.4; }
  .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
  .todo-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .entry-item { border-left: 3px solid var(--primary); padding: 12px 16px; background: #f8faff; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  .entry-date { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .entry-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .entry-text { font-size: 13.5px; line-height: 1.6; color: #374151; white-space: pre-wrap; }
  .entry-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: #e0e7ff; color: #3730a3; font-size: 11px; padding: 2px 7px; border-radius: 12px; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
  .stat-number { font-size: 28px; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .kontakt-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text-muted); font-size: 14px; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) {
    #sidebar { width: 56px; min-width: 56px; }
    #sidebar-header, nav button span, #sync-info { display: none; }
    nav button { justify-content: center; padding: 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    #content { padding: 16px; } #topbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>📘 Dissertationsmanager</h1>
    <p>Persönliches Forschungstool</p>
  </div>
  <nav>
    <button class="active" onclick="showSection('dashboard')"><span class="icon">🏠</span><span>Übersicht</span></button>
    <button onclick="showSection('meilensteine')"><span class="icon">🎯</span><span>Meilensteine</span></button>
    <button onclick="showSection('termine')"><span class="icon">📅</span><span>Termine</span></button>
    <button onclick="showSection('todos')"><span class="icon">✅</span><span>To-Do</span></button>
    <button onclick="showSection('tagebuch')"><span class="icon">📓</span><span>Forschungstagebuch</span></button>
    <button onclick="showSection('kontakte')"><span class="icon">👥</span><span>Kontakte</span></button>
    <button onclick="showSection('literatur')"><span class="icon">📚</span><span>What to Read</span></button>
  </nav>
  <div id="sync-info"><span id="sync-dot"></span><span id="sync-label">Verbunden</span></div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Übersicht</h2>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div> Lade Daten…</div></div>
</div>

<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const SUPABASE_URL = 'https://xzizwgtccknlbjijuavq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qIR0v_iUl_7Mgpdz_j5-Mg_JIi80BeV';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let data = { meilensteine: [], termine: [], todos: [], tagebuch: [], kontakte: [], literatur: [] };

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  const states = { ok: ['#10b981','Verbunden'], loading: ['#f59e0b','Speichert…'], error: ['#ef4444','Fehler'] };
  const [color, text] = states[s] || states.ok;
  dot.style.background = color; lbl.textContent = text;
}

async function loadAll() {
  setSyncStatus('loading');
  try {
    const [m, t, td, tb, k, l] = await Promise.all([
      sb.from('meilensteine').select('*').order('created_at'),
      sb.from('termine').select('*').order('datum'),
      sb.from('todos').select('*').order('created_at'),
      sb.from('tagebuch').select('*').order('datum', { ascending: false }),
      sb.from('kontakte').select('*').order('name'),
      sb.from('literatur').select('*').order('created_at')
    ]);
    data.meilensteine = m.data || [];
    data.termine = t.data || [];
    data.todos = td.data || [];
    data.tagebuch = tb.data || [];
    data.kontakte = k.data || [];
    data.literatur = l.data || [];
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); console.error(e); }
}

async function upsertItem(table, obj) {
  setSyncStatus('loading');
  const { error } = await sb.from(table).upsert(obj);
  setSyncStatus(error ? 'error' : 'ok');
  if (error) alert('Fehler beim Speichern: ' + error.message);
  return !error;
}

async function deleteItem(list, id) {
  if (!confirm('Wirklich löschen?')) return;
  setSyncStatus('loading');
  const { error } = await sb.from(list).delete().eq('id', id);
  if (!error) { data[list] = data[list].filter(x => x.id !== id); renderCurrent(); }
  setSyncStatus(error ? 'error' : 'ok');
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function fmtDate(d) { if (!d) return '—'; return new Date(d+'T12:00:00').toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function daysUntil(d) { if (!d) return null; const today = new Date(); today.setHours(0,0,0,0); const target = new Date(d); target.setHours(0,0,0,0); return Math.round((target - today) / 86400000); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let currentSection = 'dashboard';
function showSection(s) {
  currentSection = s;
  document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', ['dashboard','meilensteine','termine','todos','tagebuch','kontakte'][i]===s));
  renderCurrent();
}
function renderCurrent() { renderSection(currentSection); }
function renderSection(s) {
  const titles = {dashboard:'Übersicht',meilensteine:'Meilensteine',termine:'Termine & Interviews',todos:'To-Do Liste',tagebuch:'Forschungstagebuch',kontakte:'Kontaktliste',literatur:'📚 What to Read'};
  document.getElementById('page-title').textContent = titles[s]||'';
  const actions = document.getElementById('topbar-actions'); actions.innerHTML = '';
  const content = document.getElementById('content');
  if (s==='dashboard') renderDashboard(content);
  else if (s==='meilensteine') { actions.innerHTML='<button class="btn btn-primary" onclick="openMeilensteinModal()">+ Meilenstein</button>'; renderMeilensteine(content); }
  else if (s==='termine') { actions.innerHTML='<button class="btn btn-primary" onclick="openTerminModal()">+ Termin</button>'; renderTermine(content); }
  else if (s==='todos') { actions.innerHTML='<button class="btn btn-primary" onclick="openTodoModal()">+ Aufgabe</button>'; renderTodos(content); }
  else if (s==='tagebuch') { actions.innerHTML='<button class="btn btn-primary" onclick="openEintragModal()">+ Eintrag</button>'; renderTagebuch(content); }
  else if (s==='kontakte') { actions.innerHTML='<button class="btn btn-primary" onclick="openKontaktModal()">+ Kontakt</button>'; renderKontakte(content); }
  else if (s==='literatur') { actions.innerHTML='<button class="btn btn-primary" onclick="openLiteraturModal()">+ Literatur</button>'; renderLiteratur(content); }
}

function renderDashboard(el) {
  const doneM = data.meilensteine.filter(m=>m.status==='abgeschlossen').length;
  const offeneT = data.termine.filter(t=>new Date(t.datum)>=new Date()).length;
  const upcoming = [...data.termine].filter(t=>new Date(t.datum)>=new Date()).sort((a,b)=>new Date(a.datum)-new Date(b.datum)).slice(0,3);
  const offeneM = [...data.meilensteine].filter(m=>m.status!=='abgeschlossen').sort((a,b)=>new Date(a.faellig||'9999')-new Date(b.faellig||'9999')).slice(0,4);
  const pending = data.todos.filter(t=>!t.done).slice(0,5);
  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number">${data.meilensteine.length}</div><div class="stat-label">Meilensteine</div></div>
    <div class="stat-card"><div class="stat-number">${doneM}</div><div class="stat-label">Abgeschlossen</div></div>
    <div class="stat-card"><div class="stat-number">${offeneT}</div><div class="stat-label">Anstehende Termine</div></div>
    <div class="stat-card"><div class="stat-number">${data.todos.filter(t=>!t.done).length}</div><div class="stat-label">Offene Aufgaben</div></div>
    <div class="stat-card"><div class="stat-number">${data.tagebuch.length}</div><div class="stat-label">Tagebucheinträge</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-header"><h3>📅 Nächste Termine</h3></div>
      ${upcoming.length===0?'<div class="empty-state"><p>Keine anstehenden Termine</p></div>':upcoming.map(t=>{const d=daysUntil(t.datum);return`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:13px">${esc(t.titel)}</div><div style="font-size:11px;color:var(--text-muted)">${fmtDateTime(t.datum)}</div></div><span class="badge ${d<=2?'badge-red':d<=7?'badge-yellow':'badge-blue'}">${d===0?'Heute':d===1?'Morgen':d+'d'}</span></div>`;}).join('')}
    </div>
    <div class="card"><div class="card-header"><h3>🎯 Offene Meilensteine</h3></div>
      ${offeneM.length===0?'<div class="empty-state"><p>Alle erledigt 🎉</p></div>':offeneM.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:10px;height:10px;border-radius:50%;background:${m.status==='in_bearbeitung'?'#3d52a0':'#9ca3af'};flex-shrink:0"></div><div style="flex:1;font-size:13px;font-weight:500">${esc(m.titel)}</div><div style="font-size:11px;color:var(--text-muted)">${m.faellig?fmtDate(m.faellig):''}</div></div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-top:16px"><div class="card-header"><h3>✅ Offene Aufgaben</h3></div>
    ${pending.length===0?'<div class="empty-state"><p>Alle Aufgaben erledigt 🎉</p></div>':pending.map(t=>`<div class="todo-item"><input type="checkbox" onchange="toggleTodo('${t.id}',this)"><div style="flex:1"><div class="todo-text">${esc(t.titel)}</div><div class="todo-meta">${t.prioritaet?'Priorität: '+t.prioritaet:''} ${t.faellig?'· '+fmtDate(t.faellig):''}</div></div>${prioBadge(t.prioritaet)}</div>`).join('')}
  </div>`;
}

function statusBadge(s) { const m={geplant:'badge-gray',in_bearbeitung:'badge-blue',abgeschlossen:'badge-green',verzoegert:'badge-red'}; return`<span class="badge ${m[s]||'badge-gray'}">${{geplant:'Geplant',in_bearbeitung:'In Bearbeitung',abgeschlossen:'Abgeschlossen',verzoegert:'Verzögert'}[s]||s}</span>`; }

function renderMeilensteine(el) {
  const sorted = [...data.meilensteine].sort((a,b)=>new Date(a.faellig||'9999')-new Date(b.faellig||'9999'));
  el.innerHTML = sorted.length===0?`<div class="card"><div class="empty-state"><div class="emoji">🎯</div><p>Füge deinen ersten Meilenstein hinzu!</p></div></div>`:
    sorted.map(m=>{const dc={abgeschlossen:'#10b981',in_bearbeitung:'#3d52a0',verzoegert:'#ef4444'}[m.status]||'#9ca3af';
    return`<div class="milestone-item"><div class="milestone-dot" style="background:${dc}"></div><div class="milestone-body"><div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><div class="milestone-title">${esc(m.titel)}</div>${statusBadge(m.status)}</div>${m.beschreibung?`<div style="font-size:13px;color:var(--text-muted);margin-top:3px">${esc(m.beschreibung)}</div>`:''}<div class="milestone-meta">${m.faellig?`<span>📅 ${fmtDate(m.faellig)}</span>`:''} ${m.kategorie?`<span>🏷 ${esc(m.kategorie)}</span>`:''} <span>📊 ${m.fortschritt||0}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${m.fortschritt||0}%"></div></div></div><div class="actions"><button class="btn btn-sm btn-ghost" onclick="openMeilensteinModal('${m.id}')">✏</button><button class="btn btn-sm btn-danger" onclick="deleteItem('meilensteine','${m.id}')">🗑</button></div></div>`;}).join('');
}

function openMeilensteinModal(id) {
  const m = id ? data.meilensteine.find(x=>x.id===id) : null;
  showModal(`<h3>${m?'Meilenstein bearbeiten':'Neuer Meilenstein'}</h3>
    <form class="form-grid" onsubmit="saveMeilenstein(event,'${id||''}')">
      <div class="form-group full"><label>Titel *</label><input name="titel" required value="${esc(m?.titel||'')}"></div>
      <div class="form-group full"><label>Beschreibung</label><textarea name="beschreibung">${esc(m?.beschreibung||'')}</textarea></div>
      <div class="form-group"><label>Fälligkeitsdatum</label><input type="date" name="faellig" value="${m?.faellig||''}"></div>
      <div class="form-group"><label>Kategorie</label><input name="kategorie" value="${esc(m?.kategorie||'')}" placeholder="z.B. Schreiben, Empirie…"></div>
      <div class="form-group"><label>Status</label><select name="status">
        <option value="geplant" ${(!m||m.status==='geplant')?'selected':''}>Geplant</option>
        <option value="in_bearbeitung" ${m?.status==='in_bearbeitung'?'selected':''}>In Bearbeitung</option>
        <option value="abgeschlossen" ${m?.status==='abgeschlossen'?'selected':''}>Abgeschlossen</option>
        <option value="verzoegert" ${m?.status==='verzoegert'?'selected':''}>Verzögert</option>
      </select></div>
      <div class="form-group"><label>Fortschritt (%)</label><input type="number" name="fortschritt" min="0" max="100" value="${m?.fortschritt??0}"></div>
      <div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button type="submit" class="btn btn-primary">Speichern</button></div>
    </form>`);
}

async function saveMeilenstein(e, id) {

function typBadge(t){const m={'Interview':'badge-blue','Betreuungsgespräch':'badge-green','Konferenz':'badge-yellow','Sonstiges':'badge-gray'};return`<span class="badge ${m[t]||'badge-gray'}">${esc(t||'—')}</span>`;}

function renderTermine(el) {
  const now=new Date();
  const upcoming=[...data.termine].filter(t=>new Date(t.datum)>=now).sort((a,b)=>new Date(a.datum)-new Date(b.datum));
  const past=[...data.termine].filter(t=>new Date(t.datum)<now).sort((a,b)=>new Date(b.datum)-new Date(a.datum));
  const tbl=(arr,lbl)=>arr.length===0?'': `<div class="card"><div class="card-header"><h3>${lbl}</h3></div><table><thead><tr><th>Titel</th><th>Datum</th><th>Typ</th><th>Person</th><th>Ort/Link</th><th></th></tr></thead><tbody>${arr.map(t=>{const d=daysUntil(t.datum);return`<tr><td><strong>${esc(t.titel)}</strong>${t.notizen?`<div style="font-size:11px;color:var(--text-muted)">${esc(t.notizen)}</div>`:''}</td><td>${fmtDateTime(t.datum)}${d!==null&&d>=0?`<br><span style="font-size:11px;color:${d<=2?'var(--danger)':d<=7?'var(--warning)':'var(--text-muted)'}">${d===0?'Heute':d===1?'Morgen':d+'d'}</span>`:''}</td><td>${typBadge(t.typ)}</td><td>${esc(t.person||'—')}</td><td style="font-size:12px">${esc(t.ort||'—')}</td><td class="actions"><button class="btn btn-sm btn-ghost" onclick="openTerminModal('${t.id}')">✏</button><button class="btn btn-sm btn-danger" onclick="deleteItem('termine','${t.id}')">🗑</button></td></tr>`;}).join('')}</tbody></table></div>`;
  el.innerHTML=upcoming.length===0&&past.length===0?`<div class="card"><div class="empty-state"><div class="emoji">📅</div><p>Füge deinen ersten Termin hinzu!</p></div></div>`:tbl(upcoming,'📅 Anstehende Termine')+tbl(past,'🕐 Vergangene Termine');
}

function prioBadge(p){if(p==='Hoch')return'<span class="badge badge-red">Hoch</span>';if(p==='Mittel')return'<span class="badge badge-yellow">Mittel</span>';if(p==='Niedrig')return'<span class="badge badge-green">Niedrig</span>';return'';}

function renderTodos(el) {
  const open=data.todos.filter(t=>!t.done).sort((a,b)=>['Hoch','Mittel','Niedrig',''].indexOf(a.prioritaet)-['Hoch','Mittel','Niedrig',''].indexOf(b.prioritaet));
  const done=data.todos.filter(t=>t.done);
  el.innerHTML=`<div class="card"><div class="card-header"><h3>Offene Aufgaben (${open.length})</h3></div>
    ${open.length===0?'<div class="empty-state"><p>Keine offenen Aufgaben 🎉</p></div>':open.map(t=>`<div class="todo-item"><input type="checkbox" onchange="toggleTodo('${t.id}',this)"><div style="flex:1"><div class="todo-text">${esc(t.titel)}</div><div class="todo-meta">${t.kategorie?esc(t.kategorie)+' · ':''}${t.faellig?'Fällig: '+fmtDate(t.faellig):''}</div></div>${prioBadge(t.prioritaet)}<div class="actions"><button class="btn btn-sm btn-ghost" onclick="openTodoModal('${t.id}')">✏</button><button class="btn btn-sm btn-danger" onclick="deleteItem('todos','${t.id}')">🗑</button></div></div>`).join('')}
  </div>${done.length>0?`<div class="card"><div class="card-header"><h3 style="color:var(--text-muted)">Erledigt (${done.length})</h3></div>${done.map(t=>`<div class="todo-item"><input type="checkbox" checked onchange="toggleTodo('${t.id}',this)"><div style="flex:1"><div class="todo-text done">${esc(t.titel)}</div></div><button class="btn btn-sm btn-danger" onclick="deleteItem('todos','${t.id}')">🗑</button></div>`).join('')}</div>`:''}`;
}

// ====== LITERATUR ======
function litStatusBadge(s) {
  if (s==='Zu lesen') return '<span class="badge badge-gray">Zu lesen</span>';
  if (s==='Am Lesen') return '<span class="badge badge-blue">Am Lesen</span>';
  if (s==='Gelesen') return '<span class="badge badge-green">Gelesen</span>';
  return '<span class="badge badge-gray">'+esc(s)+'</span>';
}
function litTypBadge(t) {
  if (t==='Theorie') return '<span class="badge badge-yellow">Theorie</span>';
  if (t==='Methode') return '<span class="badge badge-blue">Methode</span>';
  return '<span class="badge badge-gray">'+esc(t)+'</span>';
}

function renderLiteratur(el) {
  const gruppen = ['Zu lesen','Am Lesen','Gelesen'];
  el.innerHTML = `<div style="margin-bottom:12px"><input placeholder="🔍 Literatur durchsuchen…" oninput="filterLiteratur(this.value)" style="max-width:320px"></div>` +
    gruppen.map(g => {
      const items = data.literatur.filter(l => l.status === g);
      if (items.length === 0) return '';
      return `<div class="card">
        <div class="card-header"><h3>${g==='Zu lesen'?'📋':g==='Am Lesen'?'👓':'✅'} ${g} (${items.length})</h3></div>
        ${items.map(l => `<div class="lit-item" data-search="${esc(l.titel+' '+(l.autor||'')+' '+(l.notizen||''))}">
          <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <strong style="font-size:14px">${esc(l.titel)}</strong>
                ${litTypBadge(l.typ)}
              </div>
              ${l.autor?`<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${esc(l.autor)}</div>`:''}
              ${l.notizen?`<div style="font-size:13px;color:#374151;margin-top:8px;padding:8px 12px;background:#f8faff;border-radius:6px;white-space:pre-wrap">${esc(l.notizen)}</div>`:''}
            </div>
            <div class="actions">
              <button class="btn btn-sm btn-ghost" onclick="openLiteraturModal('${l.id}')">✏</button>
              <button class="btn btn-sm btn-danger" onclick="deleteItem('literatur','${l.id}')">🗑</button>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
    }).join('') +
    (data.literatur.length===0 ? `<div class="card"><div class="empty-state"><div class="emoji">📚</div><p>Füge deine erste Literatur hinzu!</p></div></div>` : '');
}

function filterLiteratur(q) {
  document.querySelectorAll('.lit-item').forEach(i => {
    i.style.display = i.dataset.search?.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

async function saveLiteratur(e, id) {
  e.preventDefault(); const f = new FormData(e.target);
  const obj = { id: id||uid(), titel: f.get('titel'), autor: f.get('autor'), typ: f.get('typ'), status: f.get('status'), notizen: f.get('notizen') };

function closeModal(){document.getElementById('modal').style.display='none';}
